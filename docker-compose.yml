services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-sdk-app-postgres
    environment:
      POSTGRES_USER: ai_sdk_app
      POSTGRES_PASSWORD: ai_sdk_app
      POSTGRES_DB: ai_sdk_app
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sdk_app -d ai_sdk_app"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
