services:
  postgres:
    image: postgres:17-alpine
    container_name: auto-tools-postgres
    environment:
      POSTGRES_USER: auto_tools
      POSTGRES_PASSWORD: auto_tools
      POSTGRES_DB: auto_tools
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_tools -d auto_tools"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
